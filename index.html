<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Outlook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        .outlook-blue { color: #0078d4; }
        .outlook-bg-blue { background-color: #0078d4; }
    </style>
</head>
<body class="bg-[#f3f2f1] text-[#323130] h-screen flex flex-col overflow-hidden text-xs select-none">

    <header class="bg-white h-12 flex items-center px-3 justify-between border-b border-[#edebe9]">
        <div class="flex items-center space-x-4 h-full pt-2">
            <span class="text-[#323130] hover:bg-[#f3f2f1] px-3 py-1 cursor-pointer font-normal">Fichier</span>
            <span class="text-[#323130] font-semibold border-b-2 border-[#0078d4] px-3 h-full flex items-center">Accueil</span>
            <span class="text-[#323130] hover:bg-[#f3f2f1] px-3 py-1 cursor-pointer font-normal">Envoi/réception</span>
            <span class="text-[#323130] hover:bg-[#f3f2f1] px-3 py-1 cursor-pointer font-normal">Affichage</span>
            <span class="text-[#323130] hover:bg-[#f3f2f1] px-3 py-1 cursor-pointer font-normal">Aide</span>
        </div>

        <div class="w-1/3 relative">
            <input type="text" id="post-search" placeholder="🔍 Rechercher dans ce dossier..." 
                   class="w-full pl-6 pr-4 py-1 bg-[#f3f2f1] placeholder-[#605e5c] border border-transparent rounded focus:outline-none focus:bg-white focus:border-[#a19f9d] text-xs">
        </div>

        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 bg-[#f3f2f1] px-2 py-1 rounded border border-[#edebe9]">
                <span class="text-[11px] text-[#605e5c]">Essayez le nouveau Outlook</span>
                <div class="w-7 h-4 bg-[#ced4da] rounded-full p-0.5 cursor-pointer flex items-center">
                    <div class="bg-white w-3 h-3 rounded-full shadow-sm"></div>
                </div>
            </div>
            <span class="text-[#605e5c] text-sm cursor-pointer hover:text-black">🔔</span>
            <div class="w-6 h-6 rounded-full bg-[#d83b01] text-white flex items-center justify-center font-semibold text-[10px] cursor-pointer">LC</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden bg-white">
        
        <div class="w-12 bg-[#f3f2f1] border-r border-[#edebe9] flex flex-col items-center py-4 space-y-6 text-[#605e5c] text-sm">
            <span class="text-[#0078d4] font-bold cursor-pointer">✉</span>
            <span class="hover:text-black cursor-pointer">📅</span>
            <span class="hover:text-black cursor-pointer">👥</span>
            <span class="hover:text-black cursor-pointer">📁</span>
            <span class="hover:text-black cursor-pointer">✓</span>
        </div>

        <nav class="w-52 bg-white border-r border-[#edebe9] flex flex-col p-2 overflow-y-auto">
            <button onclick="openModal()" class="border border-[#a19f9d] text-[#323130] bg-white rounded px-3 py-1.5 text-left font-normal hover:bg-[#f3f2f1] flex items-center space-x-2 mb-3 w-full transition text-[11px]">
                <span class="outlook-blue font-bold">+</span>
                <span>Nouveau courrier</span>
            </button>

            <div class="space-y-0.5 text-[11px]">
                <div class="flex items-center space-x-1 text-[#323130] font-semibold px-1 py-1 cursor-pointer">
                    <span>▼ Favoris</span>
                </div>
                <div class="pl-3 space-y-0.5">
                    <button onclick="loadReddit('all')" class="flex items-center justify-between px-2 py-0.5 text-[#323130] bg-[#eff6fc] border-l-2 border-[#0078d4] font-semibold w-full text-left">
                        <span>Boîte de réception</span>
                        <span class="text-[#0078d4] text-[10px] font-bold">r/all</span>
                    </button>
                    <div class="px-2 py-0.5 text-[#605e5c] hover:bg-[#f3f2f1] cursor-pointer">Éléments envoyés</div>
                    <div class="px-2 py-0.5 text-[#605e5c] hover:bg-[#f3f2f1] cursor-pointer">Éléments supprimés</div>
                </div>

                <div class="flex items-center space-x-1 text-[#323130] font-semibold px-1 py-1 pt-3 cursor-pointer">
                    <span>▼ lucas.cussac@reddit.fr</span>
                </div>
                <div class="pl-3 space-y-0.5" id="subreddits-list">
                    <button onclick="loadReddit('france')" class="flex items-center justify-between px-2 py-0.5 text-[#605e5c] hover:bg-[#f3f2f1] w-full text-left">
                        <span>r/france</span>
                    </button>
                    <button onclick="loadReddit('gaming')" class="flex items-center justify-between px-2 py-0.5 text-[#605e5c] hover:bg-[#f3f2f1] w-full text-left">
                        <span>r/gaming</span>
                    </button>
                </div>
            </div>
        </nav>

        <section class="w-80 bg-white border-r border-[#edebe9] flex flex-col overflow-y-auto">
            <div class="flex items-center px-3 py-2 border-b border-[#f3f2f1] text-[11px] text-[#605e5c] font-medium space-x-4">
                <span class="text-[#0078d4] font-semibold border-b-2 border-[#0078d4] pb-1 cursor-pointer">Prioritaire</span>
                <span class="hover:text-black cursor-pointer pb-1">Autres</span>
                <div class="flex-1 text-right text-[10px] text-[#605e5c] font-bold" id="current-folder-label">r/all</div>
            </div>

            <div id="posts-list" class="flex flex-col">
                <div class="p-3 text-[#a19f9d] italic">Mise à jour du dossier...</div>
            </div>
        </section>

        <main class="flex-1 bg-white flex flex-col overflow-y-auto" id="post-view">
            <div class="text-[#a19f9d] flex flex-col items-center justify-center h-full">
                <p class="text-xs">Sélectionnez un élément pour le lire.</p>
            </div>
        </main>
    </div>

    <div id="outlook-modal" class="hidden fixed inset-0 bg-black/20 flex items-center justify-center z-50">
        <div class="bg-white w-[460px] rounded shadow-lg border border-[#a19f9d] flex flex-col overflow-hidden">
            <div class="bg-[#f3f2f1] px-3 py-1.5 flex justify-between items-center border-b border-[#edebe9]">
                <span class="font-semibold text-[11px] text-[#323130]">Nouveau message</span>
                <button onclick="closeModal()" class="text-[#605e5c] font-bold">✕</button>
            </div>
            <div class="p-3 flex flex-col space-y-2 text-[11px]">
                <div class="flex items-center border-b border-[#edebe9] pb-1">
                    <span class="w-12 text-[#605e5c]">À :</span>
                    <div class="bg-[#eff6fc] text-[#0078d4] px-1.5 py-0.5 rounded border border-[#c7e0f4] font-medium">Serveur Reddit</div>
                </div>
                <div class="flex items-center border-b border-[#edebe9] pb-1">
                    <span class="w-12 text-[#605e5c]">Objet :</span>
                    <input type="text" id="modal-sub-input" placeholder="Nom du subreddit à ajouter (ex: pics, askreddit)" class="flex-1 outline-none font-semibold text-[#323130]">
                </div>
            </div>
            <div class="bg-[#f3f2f1] px-3 py-2 flex justify-end space-x-2 border-t border-[#edebe9]">
                <button onclick="closeModal()" class="px-3 py-1 border border-[#a19f9d] bg-white text-[#323130]">Abandonner</button>
                <button onclick="submitModal()" class="px-4 py-1 outlook-bg-blue text-white font-semibold">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        let currentPosts = [];
        let readPosts = new Set();
        let activeSubreddit = 'all';

        function openModal() { document.getElementById('outlook-modal').classList.remove('hidden'); document.getElementById('modal-sub-input').focus(); }
        function closeModal() { document.getElementById('outlook-modal').classList.add('hidden'); document.getElementById('modal-sub-input').value = ''; }
        
        function submitModal() {
            const input = document.getElementById('modal-sub-input');
            const sub = input.value.trim().toLowerCase().replace('r/', '');
            if (sub !== '') { addNewSubredditMenu(sub); loadReddit(sub); closeModal(); }
        }
        
        document.getElementById('modal-sub-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') submitModal(); });
        document.getElementById('post-search').addEventListener('input', (e) => { renderPostsList(e.target.value.toLowerCase().trim()); });

        function addNewSubredditMenu(sub) {
            const list = document.getElementById('subreddits-list');
            if ([...list.querySelectorAll('span')].some(el => el.innerText === `r/${sub}`)) return;
            const button = document.createElement('button');
            button.onclick = () => loadReddit(sub);
            button.className = "flex items-center justify-between px-2 py-0.5 text-[#605e5c] hover:bg-[#f3f2f1] w-full text-left";
            button.innerHTML = `<span>r/${sub}</span>`;
            list.appendChild(button);
        }

        // Système d'injection de script dynamique pour le JSONP
        function fetchJSONP(url, callbackName) {
            const oldScript = document.getElementById('jsonp-script');
            if (oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'jsonp-script';
            script.src = `${url}${url.includes('?') ? '&' : '?'}jsonp=${callbackName}&nocache=${Date.now()}`;
            document.body.appendChild(script);
        }

        // Callback global exécuté pour charger la liste des posts
        window.onRedditPostsLoaded = function(result) {
            if (result && result.data && result.data.children) {
                currentPosts = result.data.children;
                renderPostsList();
            } else {
                document.getElementById('posts-list').innerHTML = '<div class="p-3 text-red-600">Erreur de structure de données.</div>';
            }
        };

        // Callback global exécuté pour charger les commentaires
        window.onRedditCommentsLoaded = function(result) {
            const container = document.getElementById('comments-container');
            if(document.getElementById('comments-loading')) document.getElementById('comments-loading').remove();
            
            if (!result || !result[1] || !result[1].data || !result[1].data.children) {
                container.innerHTML = '<p class="text-xs text-gray-400 italic">Aucune réponse dans ce fil.</p>';
                return;
            }

            const comments = result[1].data.children;
            comments.slice(0, 8).forEach(comment => {
                if (comment.kind === 'more') return;
                const c = comment.data;
                const commentBox = document.createElement('div');
                commentBox.className = "bg-white p-2.5 border border-[#edebe9] rounded-sm flex flex-col space-y-1";
                commentBox.innerHTML = `
                    <div class="flex justify-between items-center text-[10px] border-b border-[#f3f2f1] pb-1 text-[#605e5c]">
                        <span class="font-bold text-[#323130]">Re: u/${c.author || 'Anonyme'}</span>
                        <span>👍 ${c.ups || 0}</span>
                    </div>
                    <p class="text-[11px] text-
